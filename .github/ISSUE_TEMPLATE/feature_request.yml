name: Feature Request
description: Suggest a new feature for GeoTask Core
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This feature belongs in GeoTask Core (not Runtime or Domain Pack)
        - label: This feature does not require external model APIs
        - label: This feature maintains the zero-heavy-dependency principle
